<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motif Bridge</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Motif Bridge</h1>
        <p id="pairing" class="subtitle">starting…</p>
      </header>
      <section class="library-section">
        <h2 class="library-heading">Library</h2>
        <p id="empty" class="empty">Waiting for an idea to sync from your phone…</p>
        <ul id="library" class="library"></ul>
      </section>
      <section id="preview" class="preview" hidden>
        <div class="preview-copy">
          <span class="preview-label">Preview</span>
          <strong id="preview-name"></strong>
        </div>
        <audio id="player" controls></audio>
      </section>
      <p id="handoff-status" class="handoff-status" aria-live="polite"></p>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
