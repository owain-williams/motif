<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motif Bridge</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Motif Bridge</h1>
        <p id="pairing" class="subtitle">starting…</p>
      </header>
      <section class="cloud-account" aria-labelledby="cloud-heading">
        <div>
          <h2 id="cloud-heading">Cloud relay</h2>
          <p id="cloud-status">Log in to sync Basic/Pro Ideas from anywhere.</p>
        </div>
        <form id="cloud-login" class="cloud-login">
          <input id="cloud-email" type="email" autocomplete="email" placeholder="Email" required />
          <input id="cloud-password" type="password" autocomplete="current-password" placeholder="Password" required />
          <button type="submit">Log in</button>
        </form>
        <button id="cloud-logout" type="button" hidden>Log out</button>
      </section>
      <section class="library-section">
        <h2 class="library-heading">Library</h2>
        <input
          id="library-search"
          class="library-search"
          type="search"
          aria-label="Search Library"
          placeholder="Search name, tags, instrument, style, tempo, location"
        />
        <p id="empty" class="empty">Waiting for an Idea to sync from your phone…</p>
        <ul id="library" class="library"></ul>
      </section>
      <section id="recently-deleted-section" class="library-section" aria-labelledby="recently-deleted-heading" hidden>
        <h2 id="recently-deleted-heading" class="library-heading">Recently Deleted</h2>
        <p id="recently-deleted-hint" class="empty"></p>
        <ul id="recently-deleted" class="library"></ul>
      </section>
      <section id="preview" class="preview" hidden>
        <div class="preview-copy">
          <span class="preview-label">Preview</span>
          <strong id="preview-name"></strong>
        </div>
        <audio id="player" controls></audio>
      </section>
      <p id="handoff-status" class="handoff-status" aria-live="polite"></p>
    </main>

    <div id="metadata-backdrop" class="metadata-backdrop" hidden>
      <form id="metadata-form" class="metadata-form" aria-labelledby="metadata-title">
        <h2 id="metadata-title">Edit metadata</h2>
        <p id="metadata-idea-name" class="metadata-idea-name"></p>

        <label class="metadata-label" for="edit-tags">Tags</label>
        <input id="edit-tags" class="metadata-input" type="text" placeholder="comma-separated" autocomplete="off" />
        <div id="edit-tags-suggestions" class="metadata-suggestions"></div>

        <label class="metadata-label" for="edit-instrument">Instrument</label>
        <input id="edit-instrument" class="metadata-input" type="text" placeholder="comma-separated" autocomplete="off" />
        <div id="edit-instrument-suggestions" class="metadata-suggestions"></div>

        <label class="metadata-label" for="edit-style">Style</label>
        <input id="edit-style" class="metadata-input" type="text" placeholder="comma-separated" autocomplete="off" />
        <div id="edit-style-suggestions" class="metadata-suggestions"></div>

        <label class="metadata-label" for="edit-tempo">Tempo (BPM)</label>
        <input id="edit-tempo" class="metadata-input" type="number" min="1" step="1" placeholder="e.g. 120" />

        <div id="edit-location-group" class="metadata-location" hidden>
          <label class="metadata-label" for="edit-location-label">Location</label>
          <input id="edit-location-label" class="metadata-input" type="text" placeholder="Place label" autocomplete="off" />
          <div class="metadata-location-meta">
            <span id="edit-location-coords" class="metadata-coords"></span>
            <button type="button" id="edit-location-remove" class="metadata-location-remove">Remove</button>
          </div>
        </div>

        <div class="metadata-actions">
          <button type="button" id="metadata-cancel" class="metadata-cancel">Cancel</button>
          <button type="submit" class="metadata-save">Save</button>
        </div>
      </form>
    </div>

    <div id="delete-backdrop" class="metadata-backdrop" hidden>
      <form id="delete-form" class="metadata-form" aria-labelledby="delete-title">
        <h2 id="delete-title">Delete Idea?</h2>
        <p id="delete-message" class="metadata-idea-name"></p>
        <div class="metadata-actions">
          <button type="button" id="delete-cancel" class="metadata-cancel">Cancel</button>
          <button type="submit" class="delete-confirm">Delete</button>
        </div>
      </form>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
