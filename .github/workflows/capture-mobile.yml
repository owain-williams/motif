name: Build Capture (mobile)

# Triggers an EAS Build (Expo's cloud) for the Capture app on iOS and/or
# Android using the "preview" profile (internal distribution: an installable
# .ipa for your registered devices and an .apk for Android).
#
# The build runs on Expo's servers, so this workflow only needs an EXPO_TOKEN
# secret — no Apple certificates. Download the finished .ipa/.apk from the
# build page on expo.dev (or `eas build:list`).
#
# Setup required before the first run:
#   1. Create a free account at https://expo.dev
#   2. In apps/capture: `eas login` then `eas init` (links the project)
#   3. Register iOS credentials once (interactive Apple login):
#        `eas device:create`   # register your iPhone for internal installs
#        `eas credentials`     # or let the first `eas build -p ios` set them up
#   4. Create an Expo access token (expo.dev -> Account -> Settings ->
#      Access tokens) and add it as a repo secret:
#        gh secret set EXPO_TOKEN --repo owain-williams/motif
on:
  workflow_dispatch:
    inputs:
      platform:
        description: Which platform to build
        type: choice
        options: [all, ios, android]
        default: all
  push:
    tags:
      - "capture-v*"

concurrency:
  group: capture-mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Installs eas-cli and authenticates using the EXPO_TOKEN secret.
      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Kicks off the cloud build and returns immediately; the artifact appears
      # on expo.dev when it finishes. Tag pushes have no input, so default 'all'.
      - name: Trigger EAS build
        working-directory: apps/capture
        run: eas build --platform ${{ github.event.inputs.platform || 'all' }} --profile preview --non-interactive --no-wait
